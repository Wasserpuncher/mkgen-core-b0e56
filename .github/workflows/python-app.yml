# Dieser Workflow wird ausgelöst, wenn Code in das Repository gepusht oder ein Pull Request erstellt wird.
# This workflow is triggered when code is pushed to the repository or a pull request is created.
name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    # Der Runner, auf dem der Job ausgeführt wird.
    # The runner on which the job will run.
    runs-on: ubuntu-latest

    steps:
    # Checkout des Repository-Codes.
    # Checks out the repository code.
    - uses: actions/checkout@v4

    # Einrichten der Python-Umgebung.
    # Sets up the Python environment.
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    # Installieren der Abhängigkeiten.
    # Installs dependencies.
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # Ausführen der Tests.
    # Runs tests.
    - name: Run tests
      run: |
        python -m unittest discover
